<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Fragment</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
</head>
<body>
<div th:fragment="footer">
    <footer class="bg-gray-900 text-gray-300 py-12 border-t border-gray-800 mt-auto">
        <div class="container mx-auto px-6">
            <div class="flex flex-col items-center text-center">

                <!-- Branding -->
                <div class="flex items-center gap-2 mb-6">
                    <div class="bg-blue-600/20 p-2 rounded-xl">
                        <i data-lucide="fish" class="w-6 h-6 text-blue-500"></i>
                    </div>
                    <span class="text-xl font-bold text-white tracking-tight">Fishing Buddy</span>
                </div>

                <!-- Main Text -->
                <p class="text-sm max-w-md mb-4 leading-relaxed" th:text="#{companion}">
                    Your ultimate fishing companion for tracking catches and weather.
                </p>

                <!-- Data Source Info -->
                <div class="flex items-center gap-2 text-xs text-gray-500 mb-8 bg-gray-800/50 px-4 py-2 rounded-full">
                    <i data-lucide="info" class="w-3 h-3"></i>
                    <span th:text="#{data.provided}">Weather and location data provided by trusted sources.</span>
                </div>

                <!-- Copyright -->
                <div class="pt-8 border-t border-gray-800 w-full">
                    <p class="text-xs text-gray-600">
                        &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span>
                        Fishing Buddy. <span th:text="#{all.rights}">All rights reserved.</span>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Ensure Lucide icons are always initialized if they weren't on the main page -->
    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</div>
</body>
</html>
