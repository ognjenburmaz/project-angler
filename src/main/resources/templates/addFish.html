<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:x-transition="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record A Catch | Fishing Buddy</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/?size=160&id=DeHAfTPdyqoS&format=png">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Poppins', sans-serif; }
        #map { height: 300px; z-index: 10; }
        /* Fix Leaflet z-index to stay under navbar */
        .leaflet-control-container { z-index: 40 !important; }
        .leaflet-pane { z-index: 30 !important; }
    </style>
</head>
<body class="bg-gray-50">
<div th:replace="~{navbar :: navbar}"></div>

<main class="container mx-auto px-4 py-8 max-w-5xl">
    <!-- Header -->
    <div class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold text-gray-800" th:text="#{record.a.catch}">Record a Catch</h1>
        <p class="text-gray-500" th:text="#{log.details}">Save your catch details and environmental conditions.</p>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" x-data="{ show: true }" x-show="show" x-cloak
         class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5"></i>
            <span th:text="${error}">Error message</span>
        </div>
        <button @click="show = false" class="text-red-500 hover:text-red-700">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <form th:action="@{/statistics/addFish}"
          method="POST"
          th:object="${catchRequest}"
          enctype="multipart/form-data"
          class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Left Column: Location (Where) -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-green-100 rounded-lg text-green-600">
                        <i data-lucide="map-pin" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800" th:text="#{catch.spot}">Catch Location</h2>
                </div>

                <div id="map" class="rounded-2xl border border-gray-200 mb-4 overflow-hidden"></div>

                <div class="space-y-4">
                    <div id="location-status" class="text-sm font-medium text-blue-600 flex items-center gap-2">
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                        <span th:text="#{finding.location}">Detecting location...</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider" th:text="#{latitude}">Latitude</label>
                            <input type="text" th:field="*{latitude}" id="latitude" readonly required
                                   class="w-full bg-gray-50 border-none rounded-xl text-sm font-mono text-gray-600 focus:ring-0">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider" th:text="#{longitude}">Longitude</label>
                            <input type="text" th:field="*{longitude}" id="longitude" readonly required
                                   class="w-full bg-gray-50 border-none rounded-xl text-sm font-mono text-gray-600 focus:ring-0">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label for="city" class="text-sm font-semibold text-gray-700" th:text="#{confirm.city}">Confirm City</label>
                        <select id="city" th:field="*{city}" required
                                class="w-full p-3 bg-gray-50 border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 transition-all">
                            <option value="Sremska Mitrovica">Sremska Mitrovica</option>
                            <option value="Novi Sad">Novi Sad</option>
                            <option value="Belgrade" th:text="#{belgrade}">Belgrade</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Details (What) -->
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-blue-100 rounded-lg text-blue-600">
                        <i data-lucide="fish" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800" th:text="#{whats.catch}">Catch Details</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Fish Type -->
                    <div class="md:col-span-2 space-y-1">
                        <label class="text-sm font-semibold text-gray-700" th:text="#{pick.fish}">Fish Species</label>
                        <select th:field="*{type}" class="w-full p-3 bg-gray-50 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                            <option th:each="ft : ${fishTypes}"
                                    th:value="${ft}"
                                    th:text="#{${ft.messageKey}}">Zander</option>
                        </select>
                    </div>

                    <!-- Weight -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-gray-700" th:text="#{input.weight}">Weight (kg)</label>
                        <div class="relative">
                            <input type="number" th:field="*{weight}" step="0.01" min="0" required
                                   class="w-full p-3 pl-10 bg-gray-50 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                            <i data-lucide="weight" class="w-4 h-4 absolute left-3 top-4 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Length -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-gray-700" th:text="#{input.length}">Length (cm)</label>
                        <div class="relative">
                            <input type="number" th:field="*{length}" min="1" required
                                   class="w-full p-3 pl-10 bg-gray-50 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0">
                            <i data-lucide="ruler" class="w-4 h-4 absolute left-3 top-4 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Note -->
                    <div class="md:col-span-2 space-y-1">
                        <label class="text-sm font-semibold text-gray-700" th:text="#{leave.note}">Notes</label>
                        <textarea th:field="*{note}" rows="3" maxlength="255"
                                  class="w-full p-3 bg-gray-50 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 resize-none"
                                  th:placeholder="#{note.placeholder}"></textarea>
                    </div>

                    <!-- Image Upload Section -->
                    <div class="md:col-span-2 space-y-1">
                        <label class="text-sm font-semibold text-gray-700" th:text="#{upload.picture}">Catch Photo</label>
                        <div class="mt-1 flex flex-col items-center justify-center px-6 pt-5 pb-6 border-2 border-gray-200 border-dashed rounded-2xl hover:border-blue-400 transition-colors">

                            <!-- Preview Container -->
                            <div id="preview-container" class="hidden mb-4 w-full max-w-[200px] aspect-square rounded-xl overflow-hidden border border-gray-100 shadow-sm">
                                <img id="image-preview" src="#" alt="Preview" class="w-full h-full object-cover">
                            </div>

                            <div class="space-y-1 text-center" id="upload-prompt">
                                <i data-lucide="image" class="mx-auto h-12 w-12 text-gray-400"></i>
                                <div class="flex text-sm text-gray-600">
                                    <label for="picture" class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500">
                                        <span th:text="#{upload.an.image}">Upload a file</span>
                                        <!-- Added onchange="previewImage(event)" -->
                                        <input id="picture" name="picture" type="file" accept="image/*" class="sr-only" onchange="previewImage(event)">
                                    </label>
                                </div>
                                <p class="text-xs text-gray-500">PNG, JPG up to 5MB</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 hover:shadow-blue-200 transition-all transform active:scale-95">
                        <span th:text="#{submit}">Submit Catch</span>
                    </button>
                </div>
            </div>
        </div>
    </form>
</main>

<div th:replace="~{footer :: footer}"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    lucide.createIcons();

    // Geolocation & Map Logic
    let map, marker;
    const statusEl = document.getElementById('location-status');

    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, showError);
        } else {
            statusEl.innerHTML = '<span class="text-red-500">Geolocation not supported</span>';
        }
    };

    function showPosition(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        document.getElementById("latitude").value = lat.toFixed(6);
        document.getElementById("longitude").value = lng.toFixed(6);
        statusEl.innerHTML = '<i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i> <span class="text-green-600">Location verified</span>';
        lucide.createIcons();

        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            marker = L.marker([lat, lng]).addTo(map);
        } else {
            map.setView([lat, lng], 14);
            marker.setLatLng([lat, lng]);
        }
    }

    function showError(error) {
        statusEl.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
    }

    function validateFile(input) {
        const maxSize = 5 * 1024 * 1024;
        if (input.files && input.files[0]) {
            if (input.files[0].size > maxSize) {
                alert("File too large! Max 5MB.");
                input.value = "";
            }
        }
    }

    function previewImage(event) {
        const reader = new FileReader();
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('image-preview');
        const uploadPrompt = document.getElementById('upload-prompt');

        reader.onload = function() {
            if (reader.readyState === 2) {
                previewImage.src = reader.result;
                previewContainer.classList.remove('hidden');
                // Optional: Change prompt text after selection
                document.querySelector('[th\\:text="#{upload.a.file}"]').innerText = "Change file";
            }
        }

        if (event.target.files[0]) {
            // Validate size before preview
            if (event.target.files[0].size > 5 * 1024 * 1024) {
                alert("File too large! Max 5MB.");
                event.target.value = "";
                return;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>
</body>
</html>
