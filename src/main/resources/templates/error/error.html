<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Fishing Buddy</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/?size=160&id=DeHAfTPdyqoS&format=png">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .wave-animation { animation: wave 3s ease-in-out infinite; }
        @keyframes wave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
<div th:replace="~{navbar :: navbar}"></div>

<main class="flex-grow flex items-center justify-center px-6 py-12">
    <div class="max-w-md w-full text-center">

        <!-- Thematic Icon -->
        <div class="mb-8 flex justify-center wave-animation">
            <div class="relative">
                <div class="absolute inset-0 bg-blue-100 rounded-full scale-150 blur-2xl opacity-40"></div>
                <div class="relative bg-white p-6 rounded-full shadow-xl border border-blue-50">
                    <i data-lucide="life-buoy" class="w-16 h-16 text-blue-600"></i>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <h1 class="text-3xl font-extrabold text-gray-900 mb-4" th:text="#{error.title}">Rough Waters!</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            <span th:text="#{error.message.prefix}">Something went wrong:</span><br>
            <span class="font-bold text-red-500" th:text="${error != null ? error : 'An unexpected error occurred.'}">Unknown Error</span>
        </p>

        <!-- Actions -->
        <div class="flex flex-col gap-3">
            <a th:href="@{/static}" class="w-full bg-gradient-to-r from-blue-600 to-green-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:opacity-90 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span th:text="#{go.home}">Back to Safety</span>
            </a>
            <button onclick="history.back()" class="w-full bg-white text-gray-700 font-bold py-4 rounded-2xl border border-gray-200 hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                <span th:text="#{try.again}">Try Again</span>
            </button>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
