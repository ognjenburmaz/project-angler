<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Catches | Fishing Buddy</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/?size=160&id=DeHAfTPdyqoS&format=png">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x/dist/cdn.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- DataTables & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.tailwindcss.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.tailwindcss.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .dataTables_wrapper .dataTables_length select { padding-right: 2.5rem !important; }
        table.dataTable thead th { border-bottom: none !important; }
    </style>
</head>
<body class="bg-gray-50">
<div th:replace="~{navbar :: navbar}"></div>

<main class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-800" th:text="#{my.catches}">My Catches</h1>
            <p class="text-gray-500" th:text="#{manage.catches}">View and manage your fishing history.</p>
        </div>
        <a th:href="@{/statistics/addFish}" class="inline-flex items-center justify-center gap-2 bg-blue-600 text-white font-bold px-6 py-3 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-95">
            <i data-lucide="plus-circle" class="w-5 h-5"></i>
            <span th:text="#{record.a.catch}">Add New Catch</span>
        </a>
    </div>

    <!-- Desktop Table View (Hidden on Mobile) -->
    <div class="hidden md:block bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-6">
        <table id="fishTable" class="w-full text-sm text-left">
            <thead class="text-xs text-gray-400 uppercase tracking-widest bg-gray-50">
            <tr>
                <th class="px-6 py-4">#</th>
                <th class="px-6 py-4" th:text="#{table.header.type}">Species</th>
                <th class="px-6 py-4" th:text="#{table.header.weight}">Weight</th>
                <th class="px-6 py-4" th:text="#{table.header.length}">Length</th>
                <th class="px-6 py-4" th:text="#{table.header.time}">Date</th>
                <th class="px-6 py-4 text-right" th:text="#{table.header.actions}">Actions</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
            <tr th:each="catch, iterStat : ${allFish}" class="hover:bg-blue-50/50 transition-colors group">
                <td class="px-6 py-4 font-medium text-gray-400" th:text="${iterStat.count}">1</td>
                <td class="px-6 py-4">
                    <span class="font-bold text-gray-800" th:text="${catch.fish.type}">Zander</span>
                </td>
                <td class="px-6 py-4 text-gray-600" th:text="${catch.fish.weight + ' kg'}">2.5 kg</td>
                <td class="px-6 py-4 text-gray-600" th:text="${catch.fish.length + ' cm'}">65 cm</td>
                <td class="px-6 py-4 text-gray-500" th:text="${#temporals.format(catch.time, 'dd-MM-yyyy HH:mm')}">12-05-2023</td>
                <td class="px-6 py-4 text-right">
                    <div class="flex justify-end gap-2">
                        <a th:href="@{/statistics/myFish/view/{id}(id=${catch.id})}"
                           class="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </a>
                        <form th:action="@{/statistics/myFish/delete/{id}(id=${catch.id})}" method="POST" onsubmit="return confirm('Delete this catch permanently?')">
                            <button type="submit" class="p-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Mobile Card View (Visible only on Mobile) -->
    <div class="md:hidden space-y-4">
        <div th:each="catch : ${allFish}" class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-lg font-bold text-gray-800" th:text="${catch.fish.type}">Zander</h3>
                    <p class="text-xs text-gray-400" th:text="${#temporals.format(catch.time, 'dd MMM yyyy, HH:mm')}">Date</p>
                </div>
                <span class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full" th:text="${catch.fish.weight + 'kg'}">2kg</span>
            </div>

            <div class="flex gap-3 mt-6">
                <a th:href="@{/statistics/myFish/view/{id}(id=${catch.id})}"
                   class="flex-1 bg-gray-50 text-gray-700 font-bold py-3 rounded-2xl text-center text-sm hover:bg-gray-100 transition-colors">
                    <span th:text="#{button.view}">View</span>
                </a>
                <form th:action="@{/statistics/myFish/delete/{id}(id=${catch.id})}" method="POST" class="flex-1">
                    <button type="submit" class="w-full bg-red-50 text-red-600 font-bold py-3 rounded-2xl text-sm hover:bg-red-100 transition-colors">
                        <span th:text="#{button.delete}">Delete</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script>
    $(document).ready(function() {
        lucide.createIcons();

        $('#fishTable').DataTable({
            responsive: true,
            pageLength: 10,
            dom: '<"flex flex-col md:flex-row justify-between items-center mb-6 gap-4"lf>rt<"flex flex-col md:flex-row justify-between items-center mt-6 gap-4"ip>',
            language: {
                search: "",
                searchPlaceholder: "Search catches...",
                lengthMenu: "_MENU_ per page"
            }
        });

        // Style the search input manually to match our theme
        $('.dataTables_filter input').addClass('bg-gray-50 border-none rounded-2xl px-4 py-2 focus:ring-2 focus:ring-blue-500 w-full md:w-64');
    });
</script>
</body>
</html>
