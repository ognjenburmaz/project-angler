<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:x-transition="http://www.w3.org/1999/xhtml">
<body>
<div th:fragment="navbar">
    <header class="bg-gradient-to-r from-blue-600 to-green-600 text-white shadow-lg fixed top-0 left-0 right-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">

            <!-- Logo -->
            <div class="flex items-center gap-2">
                <div class="bg-white/20 p-1.5 rounded-lg">
                    <i data-lucide="fish" class="w-6 h-6 text-white"></i>
                </div>
                <a th:href="@{/}" class="hover:opacity-90 transition-opacity">
                    <h1 class="text-xl font-bold tracking-tight">Fishing Buddy</h1>
                </a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-2 md:gap-4">

                <!-- Language Switcher -->
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open"
                            class="p-2 rounded-xl hover:bg-white/10 transition-colors flex items-center gap-1">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                        <i data-lucide="chevron-down" class="w-3 h-3 opacity-70"></i>
                    </button>
                    <div x-show="open" @click.away="open = false" x-cloak
                         x-transition:enter="transition ease-out duration-100"
                         x-transition:enter-start="transform opacity-0 scale-95"
                         x-transition:enter-end="transform opacity-100 scale-100"
                         class="absolute right-0 mt-2 w-32 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50">
                        <a href="?lang=en" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                            <span class="mr-2">🇺🇸</span> English
                        </a>
                        <a href="?lang=sr" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                            <span class="mr-2">🇷🇸</span> Srpski
                        </a>
                    </div>
                </div>

                <!-- Main Menu -->
                <div class="relative" x-data="{ open: false, cityOpen: false }">
                    <button @click="open = !open"
                            class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl flex items-center gap-2 transition-all font-medium border border-white/10">
                        <span th:text="#{menu}">Menu</span>
                        <i data-lucide="menu" class="w-4 h-4"></i>
                    </button>

                    <div x-show="open" @click.away="open = false; cityOpen = false" x-cloak
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="transform opacity-0 scale-95"
                         x-transition:enter-end="transform opacity-100 scale-100"
                         class="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-gray-100 py-3 z-50 overflow-hidden">

                        <div class="px-4 py-2 text-xs font-bold text-gray-400 uppercase tracking-widest" th:text="#{navigation}">Navigation</div>

                        <!-- Guest Links -->
                        <div sec:authorize="!isAuthenticated()">
                            <a th:href="@{/auth/login}" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                <i data-lucide="log-in" class="w-4 h-4"></i> <span th:text="#{log.in}">Log In</span>
                            </a>
                        </div>

                        <!-- Authenticated Links -->
                        <div sec:authorize="isAuthenticated()">
                            <a th:href="@{/statistics/addFish}" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> <span th:text="#{record.a.catch}">Record Catch</span>
                            </a>
                            <a th:href="@{/statistics/myFish}" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                <i data-lucide="list" class="w-4 h-4"></i> <span th:text="#{my.catches}">My Catches</span>
                            </a>
                            <a th:href="@{/users/me}" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                <i data-lucide="user" class="w-4 h-4"></i> <span th:text="#{account}">Account</span>
                            </a>
                        </div>

                        <!-- City Conditions (Accordion Style for Mobile/Web) -->
                        <div class="border-t border-gray-50 mt-2 pt-2">
                            <button @click="cityOpen = !cityOpen"
                                    class="w-full flex items-center justify-between px-4 py-3 text-gray-700 hover:bg-blue-50 transition-colors">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="map" class="w-4 h-4"></i> <span th:text="#{city.conditions}">Conditions</span>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 h-4 transition-transform" :class="cityOpen ? 'rotate-90' : ''"></i>
                            </button>

                            <div x-show="cityOpen" x-transition class="bg-gray-50">
                                <a href="/conditions?city=Sremska Mitrovica" class="block pl-11 pr-4 py-2 text-sm text-gray-600 hover:text-blue-600">Sremska Mitrovica</a>
                                <a href="/conditions?city=Belgrade" class="block pl-11 pr-4 py-2 text-sm text-gray-600 hover:text-blue-600" th:text="#{belgrade}">Belgrade</a>
                                <a href="/conditions?city=Novi Sad" class="block pl-11 pr-4 py-2 text-sm text-gray-600 hover:text-blue-600">Novi Sad</a>
                            </div>
                        </div>

                        <!-- Logout -->
                        <div sec:authorize="isAuthenticated()" class="border-t border-gray-50 mt-2 pt-2">
                            <a th:href="@{/auth/logout}" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 transition-colors">
                                <i data-lucide="log-out" class="w-4 h-4"></i> <span th:text="#{log.out}">Log Out</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Spacer to prevent content from hiding under fixed navbar -->
    <div class="h-16"></div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
