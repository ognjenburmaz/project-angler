<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:x-transition="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account | Fishing Buddy</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/?size=160&id=DeHAfTPdyqoS&format=png">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x/dist/cdn.min.js" defer></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .auth-gradient { background: linear-gradient(135deg, #2563eb 0%, #16a34a 100%); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Simplified Header -->
<header class="auth-gradient py-6 shadow-lg">
    <div class="container mx-auto px-4 flex justify-center">
        <a th:href="@{/}" class="flex items-center gap-2 group">
            <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm group-hover:scale-110 transition-transform">
                <i data-lucide="fish" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">Fishing Buddy</h1>
        </a>
    </div>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl shadow-blue-100/50 border border-gray-100">

            <div class="text-center mb-10">
                <div class="inline-flex p-4 bg-blue-50 rounded-full text-blue-600 mb-4">
                    <i data-lucide="mail-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-3xl font-black text-gray-800 mb-2" th:text="#{verify.account}">Verify Account</h2>
                <p class="text-gray-400 text-sm" th:text="#{enter.code}">Enter the 6-digit code sent to your email.</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-2xl text-sm flex items-center gap-3">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <span th:text="${error}">Invalid code</span>
            </div>

            <form th:action="@{/auth/verify}" method="POST" th:object="${verifyUserDto}" class="space-y-6">
                <!-- Hidden Email -->
                <input type="hidden" th:field="*{email}">

                <!-- Verification Code -->
                <div class="space-y-2">
                    <label for="code" class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1" th:text="#{verification.code}">Verification Code</label>
                    <input type="text" id="code" th:field="*{verificationCode}"
                           inputmode="numeric" pattern="[0-9]*" maxlength="6" required
                           class="w-full p-5 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 transition-all text-center text-3xl font-black tracking-[1rem] text-blue-600 placeholder:text-gray-200"
                           placeholder="000000">
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 hover:scale-[1.02] active:scale-95 transition-all duration-200">
                    <span th:text="#{verify}">Verify Account</span>
                </button>
            </form>

            <!-- Resend Section -->
            <div class="mt-10 pt-8 border-t border-gray-50 text-center" x-data="{ loading: false, feedback: '', success: false }">
                <p class="text-sm text-gray-500 mb-2">
                    <span th:text="#{didnt.get.code}">Didn't get the code?</span>
                    <button type="button" @click="resendCode" :disabled="loading"
                            class="text-blue-600 font-bold hover:underline ml-1 disabled:opacity-50 disabled:no-underline"
                            th:text="#{resend}">Resend</button>
                </p>

                <!-- Feedback Message -->
                <div x-show="feedback" x-cloak x-transition
                     :class="success ? 'text-green-600' : 'text-red-600'"
                     class="text-xs font-bold mt-2 flex items-center justify-center gap-1">
                    <i :data-lucide="success ? 'check-circle' : 'alert-circle'" class="w-3 h-3"></i>
                    <span x-text="feedback"></span>
                </div>

                <p class="text-[10px] text-gray-400 mt-4 italic" th:text="#{check.spam}">Check your spam folder just in case!</p>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:inline="javascript">
    lucide.createIcons();

    function resendCode() {
        const email = /*[[${verifyUserDto.email}]]*/ '';

        this.loading = true;
        this.feedback = 'Sending...';

        const formData = new URLSearchParams();
        formData.append('email', email); // Only send email

        fetch('/auth/resend', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (response.ok) {
                    this.success = true;
                    this.feedback = 'New code sent!';
                } else {
                    this.success = false;
                    this.feedback = 'Failed to resend. Try again later.';
                }
            })
            .catch(() => {
                this.success = false;
                this.feedback = 'Network error.';
            })
            .finally(() => {
                this.loading = false;
                setTimeout(() => { this.feedback = ''; }, 5000);
                lucide.createIcons();
            });
    }
</script>
</body>
</html>
