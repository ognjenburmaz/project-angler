<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | Fishing Buddy</title>
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/?size=160&id=DeHAfTPdyqoS&format=png">
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
<div th:replace="~{navbar :: navbar}"></div>

<main class="flex-grow flex items-center justify-center px-6 py-12">
    <div class="max-w-md w-full text-center">
        <!-- Icon -->
        <div class="mb-8 flex justify-center">
            <div class="relative">
                <div class="absolute inset-0 bg-red-100 rounded-full scale-150 blur-xl opacity-50"></div>
                <div class="relative bg-white p-6 rounded-full shadow-lg border border-red-100">
                    <i data-lucide="shield-alert" class="w-16 h-16 text-red-500"></i>
                </div>
            </div>
        </div>

        <!-- Text Content -->
        <h1 class="text-6xl font-black text-gray-900 mb-4">403</h1>
        <h2 class="text-2xl font-bold text-gray-800 mb-2" th:text="#{access.denied}">Access Denied</h2>
        <p class="text-gray-500 mb-10 leading-relaxed" th:text="#{no.permission}">
            It looks like you've wandered into restricted waters. You don't have permission to view this page.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a th:href="@{/static}" class="inline-flex items-center justify-center gap-2 bg-blue-600 text-white font-bold px-8 py-3 rounded-2xl shadow-lg hover:bg-blue-700 transition-all transform active:scale-95">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span th:text="#{go.home}">Go back to Home</span>
            </a>
            <a href="javascript:history.back()" class="inline-flex items-center justify-center gap-2 bg-white text-gray-700 font-bold px-8 py-3 rounded-2xl border border-gray-200 hover:bg-gray-50 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span th:text="#{go.back}">Go Back</span>
            </a>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
